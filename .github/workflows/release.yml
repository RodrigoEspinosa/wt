name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="${REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Verify bin/wt version matches tag
        env:
          EXPECTED: ${{ steps.version.outputs.version }}
        run: |
          actual=$(grep -E '^VERSION="' bin/wt | sed -E 's/VERSION="(.*)"/\1/')
          if [ "$actual" != "$EXPECTED" ]; then
            echo "bin/wt VERSION ($actual) does not match tag ($EXPECTED)" >&2
            exit 1
          fi

      - name: Compute tarball sha256
        id: sha
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          curl -sSL "$url" -o release.tar.gz
          sha=$(sha256sum release.tar.gz | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          URL: ${{ steps.sha.outputs.url }}
          SHA: ${{ steps.sha.outputs.sha256 }}
        run: |
          python3 - <<'PY'
          import os, re, pathlib
          p = pathlib.Path("Formula/wt.rb")
          s = p.read_text()
          s = re.sub(r'url ".*"', f'url "{os.environ["URL"]}"', s, count=1)
          s = re.sub(r'sha256 ".*"', f'sha256 "{os.environ["SHA"]}"', s, count=1)
          s = re.sub(r'wt \d+\.\d+\.\d+', f'wt {os.environ["VERSION"]}', s)
          p.write_text(s)
          PY

      - name: Commit formula bump
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet Formula/wt.rb; then
            echo "Formula already up to date"
          else
            git add Formula/wt.rb
            git commit -m "chore: update formula for v${VERSION}"
            git push origin master
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" --generate-notes --title "$TAG"
